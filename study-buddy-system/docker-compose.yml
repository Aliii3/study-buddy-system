services:
  kafka:
    image: apache/kafka:3.7.2
    container_name: availability-kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  availability-service:
    build: ./services/availability-service
    container_name: availability-service
    restart: always
    depends_on:
      - kafka
    ports:
      - "4000:4000"
    env_file:
      - ./services/availability-service/.env
    environment:
      PORT: 4000
      DATABASE_URL: "postgresql://neondb_owner:npg_H4gQO0tGbpCn@ep-frosty-hat-aee84lxe-pooler.c-2.us-east-2.aws.neon.tech/availability?sslmode=require&channel_binding=require"
      KAFKA_BROKER: kafka:9092
    command: sh -c "npx prisma migrate deploy && node src/index.js"

  user-service:
    build: ./services/user-service
    container_name: user-service
    restart: always
    depends_on:
      - kafka
    ports:
      - "4001:4001"
    env_file:
      - ./services/user-service/.env
    environment:
      KAFKA_BROKER: kafka:9092
    command: node src/index.js
  
  study-session:
    build: ./services/study-session
    container_name: study-session
    restart: always
    depends_on:
      - kafka
    ports:
      - "4002:4002"
    
    environment:
      PORT: 4002
      DATABASE_URL: "postgresql://neondb_owner:npg_rKlnU7LP8htS@ep-blue-mode-an8k5me2-pooler.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require"
      KAFKA_BROKER: kafka:9092
      JWT_SECRET: supersecretkey123
    command: "node src/index.js"
  
  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    restart: always
    depends_on:
      - kafka
    ports:
      - "4003:4003"

    environment:
      PORT: 4003
      KAFKA_BROKER: kafka:9092
      DATABASE_URL: postgresql://neondb_owner:npg_H4gQO0tGbpCn@ep-frosty-hat-aee84lxe-pooler.c-2.us-east-2.aws.neon.tech/Notification?sslmode=require&channel_binding=require
      JWT_SECRET: supersecretkey123

  matching-service:
    build: ./services/matching-service
    container_name: matching-service
    restart: always
    depends_on:
      - kafka
    ports:
      - "4004:4004"
    environment:
      PORT: 4004
      KAFKA_BROKER: kafka:9092
      DATABASE_URL: postgresql://neondb_owner:npg_H4gQO0tGbpCn@ep-frosty-hat-aee84lxe-pooler.c-2.us-east-2.aws.neon.tech/Matching?sslmode=require&channel_binding=require
      JWT_SECRET: supersecretkey123
  profile-service:
    build: ./services/profile-preferences-service
    container_name: profile-preferences-service
    restart: always
    depends_on:
      - kafka
    ports:
      - "4005:4005"
    environment:
      PORT: 4005
      KAFKA_BROKER: kafka:9092
      DATABASE_URL: postgresql://neondb_owner:npg_H4gQO0tGbpCn@ep-frosty-hat-aee84lxe-pooler.c-2.us-east-2.aws.neon.tech/Preferences?sslmode=require&channel_binding=require
      JWT_SECRET: supersecretkey123